name: tamar-kfir-jewelry
region: nyc

services:
  - name: web
    # TODO: Update with your actual GitHub repository details
    # github:
    #   repo: <your-username>/tamar-kfir-jewelry
    #   branch: master
    #   deploy_on_push: true

    # Build frontend, copy assets (css/imgs/dist/favicon + homepage.js) to
    # backend/public for runtime access, install backend deps, and fetch the
    # MongoDB database tools (mongodump/mongorestore) used by the backup service.
    # NOTE: keep this in sync with the live build command in the DO dashboard.
    build_command: cd ../frontend && npm ci --include=dev && npm run build && cp -r css ../backend/public/css && cp -r imgs ../backend/public/imgs && cp -r dist/* ../backend/public/ && cp favicon.ico ../backend/public/favicon.ico && cd ../backend && npm ci && wget -q https://fastdl.mongodb.org/tools/db/mongodb-database-tools-ubuntu2204-x86_64-100.10.0.deb -O /tmp/mongo-tools.deb && dpkg -x /tmp/mongo-tools.deb /tmp/mongo-tools && cp /tmp/mongo-tools/usr/bin/mongodump . && cp /tmp/mongo-tools/usr/bin/mongorestore . && mkdir -p public/js && cp ../frontend/js/homepage.js public/js/homepage.js

    # Start the Express server from the backend directory
    run_command: cd backend && npm start

    environment_slug: node-js
    instance_count: 1
    instance_size_slug: basic-xxs
    http_port: 4000

    routes:
      - path: /

    envs:
      - key: NODE_ENV
        value: "production"
      - key: BASE_URL
        value: "${APP_URL}"
      # NOTE: Sensitive environment variables (MONGODB_URI, JWT_SECRET,
      # PAYPAL_CLIENT_ID, PAYPAL_CLIENT_SECRET, STRIPE_SECRET_KEY,
      # SPACES_BUCKET, SPACES_REGION, SPACES_ENDPOINT, SPACES_KEY,
      # SPACES_SECRET, etc.) should be configured via DigitalOcean Dashboard
      # under Settings > Environment Variables
